<!doctype html><html><head><meta charset="utf-8">
<style>
@font-face{font-family:'Geist';font-style:normal;font-weight:100 900;src:url(../assets/fonts/geist.woff2) format('woff2');}
*{margin:0;box-sizing:border-box;}
html,body{width:1200px;height:630px;overflow:hidden;}
body{background:#0e1014;font-family:'Geist',ui-sans-serif,sans-serif;display:flex;align-items:center;position:relative;}
.glow{position:absolute;top:-230px;right:-170px;width:760px;height:760px;border-radius:50%;
  background:radial-gradient(circle, rgba(240,136,62,.20), rgba(240,136,62,0) 70%);}
.wrap{padding:0 96px;position:relative;}
/* three levels — size + colour, no weight jumps: name (orange) → what it is (ink) → description (muted) */
.word{font-size:150px;font-weight:400;letter-spacing:-.045em;line-height:1;margin-bottom:18px;
  background:linear-gradient(180deg,#f7a45c,#e07a2f);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;}
.tagline{font-size:52px;font-weight:400;letter-spacing:-.015em;line-height:1.1;color:#cfd3da;margin-bottom:34px;}
.sub{font-size:34px;font-weight:400;line-height:1.34;color:#8891a0;max-width:840px;}
.url{position:absolute;left:96px;bottom:52px;font-size:24px;color:#666d76;}
</style></head>
<body>
<div class="glow"></div>
<div class="wrap">
<div class="word">Saradom</div>
<div class="tagline">Frontend architecture pattern</div>
<div class="sub">Build modular, scalable frontends in plain HTML and JavaScript. No framework, no npm, no build step.</div>
</div>
<div class="url">xtompie.github.io/saradom</div>
</body></html>
