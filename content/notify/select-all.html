<div check-space check-onchange="() => Check.Sync(this)">
  <label><input type="checkbox" check-master onchange="Check.All(this)"> All</label>
  <label><input type="checkbox" check-item onchange="this.nup('check-onchange')"> Design</label>
  <label><input type="checkbox" check-item onchange="this.nup('check-onchange')"> Build</label>
  <label><input type="checkbox" check-item onchange="this.nup('check-onchange')"> Ship</label>
</div>

<script>
const Check = (() => {
  const All = (ctx) => {
    const master = ctx.up('[check-master]');
    master.indeterminate = false;
    master.up('[check-space]').all('[check-item]').each(el => el.checked = master.checked);
  };
  const Sync = (ctx) => {
    const space = ctx.up('[check-space]');
    const items = space.all('[check-item]'), on = items.filter(el => el.checked);
    const master = space.one('[check-master]');
    master.checked = on.length === items.length;
    master.indeterminate = on.length > 0 && on.length < items.length;
  };
  return { All, Sync };
})();
</script>
