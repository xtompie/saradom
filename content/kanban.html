<div kanban-space>
    <div kanban-columns val val-fx="Arr" val-key="data" val-tpl="[kanban-column-tpl]"></div>

    <template kanban-column-tpl>
        <div kanban-column>
            <header>
                <span kanban-column-title val val-fx="Text" val-key="title"></span>
                <span kanban-count val val-fx="Text" val-key="count"></span>
            </header>
            <div kanban-cards val val-fx="Arr" val-key="cards" val-tpl="[kanban-card-tpl]" val-set="() => Kanban.Column.Drag(this)"></div>
            <button type="button" kanban-add onclick="Kanban.Modal.Add(this)">+ Add card</button>
        </div>
    </template>

    <template kanban-card-tpl>
        <article kanban-card onclick="Kanban.Modal.Edit(this)">
            <span kanban-card-title val val-fx="Text" val-key="title"
                  val-set="(d) => this.up('[kanban-card]').style.setProperty('--kanban-color', d.color)"
                  val-get="() => ({ color: this.up('[kanban-card]').style.getPropertyValue('--kanban-color').trim() })"></span>
        </article>
    </template>

    <div kanban-modal hidden kanban-modal-mode="add">
        <div kanban-backdrop onclick="Kanban.Modal.Close(this)"></div>
        <div kanban-dialog>
            <input kanban-input val val-fx="Input" val-key="title" type="text" placeholder="Title">
            <div vld-error="title" kanban-error></div>
            <div kanban-colors val val-get="() => Kanban.Palette.Picked(this)" val-set="(d) => Kanban.Palette.Pick(this, d.color)">
                <button type="button" kanban-swatch data-color="#8b5cf6" style="background:#8b5cf6" title="Violet" aria-label="Violet" onclick="Kanban.Palette.Pick(this.up('[kanban-colors]'), this.dataset.color)"></button>
                <button type="button" kanban-swatch data-color="#5a80e6" style="background:#5a80e6" title="Blue"   aria-label="Blue"   onclick="Kanban.Palette.Pick(this.up('[kanban-colors]'), this.dataset.color)"></button>
                <button type="button" kanban-swatch data-color="#2dd4bf" style="background:#2dd4bf" title="Teal"   aria-label="Teal"   onclick="Kanban.Palette.Pick(this.up('[kanban-colors]'), this.dataset.color)"></button>
                <button type="button" kanban-swatch data-color="#f59e0b" style="background:#f59e0b" title="Amber"  aria-label="Amber"  onclick="Kanban.Palette.Pick(this.up('[kanban-colors]'), this.dataset.color)"></button>
                <button type="button" kanban-swatch data-color="#f43f5e" style="background:#f43f5e" title="Rose"   aria-label="Rose"   onclick="Kanban.Palette.Pick(this.up('[kanban-colors]'), this.dataset.color)"></button>
            </div>
            <div kanban-actions>
                <button type="button" kanban-delete onclick="Kanban.Modal.Delete(this)">Delete</button>
                <button type="button" onclick="Kanban.Modal.Close(this)">Cancel</button>
                <button type="button" kanban-save onclick="Kanban.Modal.Save(this)">Save</button>
            </div>
        </div>
    </div>

    <script>
        Kanban.Init(document.currentScript, {
            data: [
                { title: 'To Do', cards: [
                    { title: 'Design landing page', color: '#8b5cf6' },
                    { title: 'Write API docs',      color: '#5a80e6' },
                    { title: 'Fix login bug',       color: '#f43f5e' },
                ] },
                { title: 'In Progress', cards: [
                    { title: 'Refactor auth module', color: '#f59e0b' },
                    { title: 'Add dark mode',        color: '#2dd4bf' },
                ] },
                { title: 'Done', cards: [
                    { title: 'Set up CI pipeline',   color: '#2dd4bf' },
                ] },
            ],
        });
    </script>
</div>
