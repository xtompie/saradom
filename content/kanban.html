<div kanban-space>
    <div kanban-columns val val-fx="Arr" val-key="data" val-tpl="[kanban-column-tpl]"></div>

    <template kanban-column-tpl>
        <div kanban-column>
            <header>
                <span kanban-column-title val val-fx="Text" val-key="title"></span>
                <span kanban-onchange="() => this.textContent = this.up('[kanban-column]').all('[kanban-card]').length"></span>
            </header>
            <div kanban-cards kanban-drag val val-fx="Arr" val-key="cards" val-tpl="[kanban-card-tpl]"></div>
            <button kanban-add onclick="Kanban.Add(this)">+ Add card</button>
        </div>
    </template>

    <template kanban-card-tpl>
        <article kanban-card onclick="Kanban.Edit(this)">
            <span kanban-card-title val val-fx="Text" val-key="title"
                  val-set="(d) => this.up('[kanban-card]').style.setProperty('--kanban-color', d.color)"
                  val-get="() => ({ color: this.up('[kanban-card]').style.getPropertyValue('--kanban-color').trim() })"></span>
        </article>
    </template>

    <template id="kanban-error-tpl">{message}</template>

    <div kanban-modal val val-get="() => ({})" hidden kanban-modal-mode="add" vld-error-tpl="#kanban-error-tpl">
        <div onclick="Kanban.Close(this)"></div>
        <section kanban-form>
            <input kanban-input val val-fx="Input" val-key="title" type="text" placeholder="Title">
            <div vld-error="title"></div>
            <div kanban-color val val-fx="Attr" val-key="color" val-attr="kanban-color-val"
                 val-set="(d) => Kanban.Select(this, d.color)">
                <button kanban-option="#8b5cf6" style="background:#8b5cf6" onclick="this.up('[kanban-color]').vset({ color: this.attr('kanban-option') })"></button>
                <button kanban-option="#5a80e6" style="background:#5a80e6" onclick="this.up('[kanban-color]').vset({ color: this.attr('kanban-option') })"></button>
                <button kanban-option="#2dd4bf" style="background:#2dd4bf" onclick="this.up('[kanban-color]').vset({ color: this.attr('kanban-option') })"></button>
                <button kanban-option="#f59e0b" style="background:#f59e0b" onclick="this.up('[kanban-color]').vset({ color: this.attr('kanban-option') })"></button>
                <button kanban-option="#f43f5e" style="background:#f43f5e" onclick="this.up('[kanban-color]').vset({ color: this.attr('kanban-option') })"></button>
            </div>
            <footer>
                <button onclick="Kanban.Save(this)">Save</button>
                <button onclick="Kanban.Close(this)">Cancel</button>
                <button kanban-delete onclick="Kanban.Delete(this)">Delete</button>
            </footer>
        </section>
    </div>

    <script>
        Kanban.Init(document.currentScript, {
            data: [
                { title: 'To Do', cards: [
                    { title: 'Design landing page', color: '#8b5cf6' },
                    { title: 'Write API docs',      color: '#5a80e6' },
                    { title: 'Fix login bug',       color: '#f43f5e' },
                ] },
                { title: 'In Progress', cards: [
                    { title: 'Refactor auth module', color: '#f59e0b' },
                    { title: 'Add dark mode',        color: '#2dd4bf' },
                ] },
                { title: 'Done', cards: [
                    { title: 'Set up CI pipeline',   color: '#2dd4bf' },
                ] },
            ],
        });
    </script>
</div>
